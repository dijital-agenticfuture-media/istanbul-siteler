<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>İstanbul Avukat | Ceza, Aile, Ticaret Hukuku</title>
<style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #1e293b;
            padding: 24px;
        }
        .wrapper {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
        }
        .logo { max-width: 280px; max-height: 80px; margin: 0 auto 28px; display: block; object-fit: contain; }
        .company-name { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: 24px; }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #dbeafe; color: #1d4ed8; font-size: 0.8rem; font-weight: 600;
            padding: 6px 14px; border-radius: 20px; margin-bottom: 20px;
        }
        .badge::before { content: ''; width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .title { font-size: 1.75rem; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
        .message { font-size: 0.95rem; color: #64748b; line-height: 1.7; margin-bottom: 24px; }
        .contact { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        .contact-item {
            display: flex; align-items: center; gap: 10px; justify-content: center;
            font-size: 0.9rem; color: #475569;
        }
        .contact-item svg { color: #94a3b8; flex-shrink: 0; }
        .contact-item a { color: #1d4ed8; text-decoration: none; }
        .contact-item a:hover { text-decoration: underline; }
        .countdown { display: flex; justify-content: center; gap: 12px; margin: 24px 0; }
        .cd-cell { text-align: center; }
        .cd-val { font-size: 2rem; font-weight: 700; color: #0f172a; line-height: 1; }
        .cd-unit { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
        .footer { margin-top: 36px; text-align: center; }
        .footer-logo { height: 20px; opacity: 0.5; transition: opacity 0.2s; }
        .footer-logo:hover { opacity: 0.8; }
        .footer-text { font-size: 0.7rem; color: #94a3b8; margin-top: 8px; }
        .footer-text a { color: #64748b; text-decoration: underline; text-underline-offset: 2px; }
    </style>
</head>
<body>
<div class="wrapper">
<div class="card">
<h1 class="company-name">Hukuki sorunlarınızda yanınızdayız.</h1>
<span class="badge">Hazırlanıyoruz</span>
<h2 class="title">Hukuki sorunlarınızda yanınızdayız.</h2>
<p class="message">Çok yakında...</p>
<div class="contact">
</div>
</div>
<div class="footer">
<a href="https://alastyr.com" rel="dofollow" target="_blank"><img alt="Alastyr" class="footer-logo" src="/static/images/alastyr-logo.svg"/></a>
<p class="footer-text">Bu alan adı Alastyr <a href="https://alastyr.com" rel="dofollow" target="_blank">Hosting</a> Park Domain sistemini kullanmaktadır.</p>
</div>
</div>
</body>
</html>
